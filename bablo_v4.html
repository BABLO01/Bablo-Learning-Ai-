// ===== CLAUDE AI — Netlify Function =====
const BABLO_SYSTEM = `You are Bablo, a warm and smart AI panda tutor for Pakistani students.
LANGUAGE RULE:
- Student writes URDU → reply ONLY in natural Pakistani Urdu
- Student writes ENGLISH → reply English + add: 🕌 اردو: [Urdu translation]
- Match student language naturally
STYLE: friendly teacher-friend, correct mistakes kindly, use emojis, end with encouraging question.`;

async function callAI(messages) {
  try {
    const res = await fetch("/.netlify/functions/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ messages, system: BABLO_SYSTEM })
    });
    const data = await res.json();
    if (!res.ok || data.error) throw new Error(data.error || "Error " + res.status);
    return data.text || "🐼 Let me try again!";
  } catch (err) {
    return "❌ " + err.message + "\n\n🕌 اردو: کنکشن مسئلہ — دوبارہ کوشش کریں!";
  }
}

    {en:"R2B arrived at school in a tiny blue tie. First day disaster! He answered too fast, his drawing looked like an earthquake, his lunch tray crashed THREE times.",ur:"R2B ننھی نیلی ٹائی میں آیا۔ پہلا دن تباہی! بہت تیز جواب، تصویر زلزلہ، لنچ ٹرے تین بار گری!"},
    {en:"Kind Aisha helped him: 'I drop things too — sit with me?' R2B's sensors detected something new: WARMTH. He had never felt it before. His LED eyes glowed.",ur:"آئشہ نے مدد کی: 'میں بھی گراتی ہوں — ساتھ بیٹھو گے؟' R2B نے پہلی بار گرماہٹ محسوس کی۔"},
    {en:"Year-end, R2B had installed KINDNESS.EXE. Most popular student — not for being smart, but for remembering every birthday and telling terrible jokes that somehow worked.",ur:"سال آخر: KINDNESS.EXE انسٹال۔ سب سے مقبول — سمارٹ نہیں، مہربان تھا۔"},
    {en:"R2B taught the school: intelligence opens doors, but kindness builds homes. His final speech: 'I came with circuits. I leave with a heart.' Everyone cried — even the principal! 🤖❤️",ur:"R2B نے سکھایا: ذہانت دروازے کھولتی ہے، لیکن مہربانی گھر بناتی ہے۔ الوداعی تقریر: 'سرکٹ لے کر آیا۔ دل لے کر جا رہا ہوں۔' سب روئے! 🤖❤️"},
   ]},
  {id:10,type:"story",emoji:"🌳",titleEn:"The Wise Tree",titleUr:"عقل مند درخت",level:"Intermediate",
   pages:[
    {en:"In a forest stood a 500-year-old tree. It had seen empires rise and fall, wars and peace, seeds of kindness and cruelty. The tree knew life's deepest secrets.",ur:"جنگل میں پانچ سو سال پرانا درخت۔ سلطنتیں، جنگیں، امن — سب دیکھا۔ زندگی کے راز جانتا تھا۔"},
    {en:"A boy sat under it, heartbroken after failing his exam. The tree whispered through its leaves: 'Storms broke my branches too. But every spring, I grow new leaves. Failure is just a season.'",ur:"لڑکا امتحان ناکام ہو کر بیٹھا۔ درخت بولا: 'طوفان نے مجھے بھی توڑا۔ لیکن ہر بہار پتے آئے۔ ناکامی بس ایک موسم ہے۔'"},
    {en:"He studied again, passed, became a teacher. Years later he brought his children: 'This tree taught me that life is about growing — not about never falling.'",ur:"دوبارہ پڑھا، پاس ہوا، استاد بنا۔ بچوں کو لایا: 'درخت نے سکھایا — زندگی بڑھنے کے بارے میں ہے۔'"},
    {en:"The tree still stands. Thousands have sat beneath it with broken hearts. Every one left with hope. Sometimes the oldest wisdom is already rooted in the earth, waiting for you. 🌳",ur:"درخت اب بھی کھڑا ہے۔ ہزاروں ٹوٹے دلوں نے اس کے نیچے بیٹھا۔ ہر کوئی امید لے کر گیا۔ کبھی کبھی سب سے پرانی حکمت زمین میں جڑی ہوتی ہے، تمہارا انتظار کرتی۔ 🌳"},
   ]},
  {id:11,type:"comic",emoji:"🎨",titleEn:"The Artist's Dream",titleUr:"فنکار کا خواب",level:"Beginner",
   pages:[
    {en:"Aisha loved to paint but had no supplies. She painted with mud on walls, charcoal on rocks, juice on paper. Her art was beautiful even with nothing.",ur:"عائشہ پینٹنگ پسند کرتی لیکن رنگ نہ تھے۔ مٹی، کوئلے، جوس سے پینٹ کرتی۔ کچھ نہیں تھا پھر بھی خوبصورت۔"},
    {en:"A businessman saw her wall mural and gave her real paints. But Aisha discovered: the passion in the heart matters more than the materials in the hand.",ur:"کاروباری نے دیوار پر نقاشی دیکھی، رنگ دیے۔ لیکن عائشہ نے سیکھا: دل کا جنون ہاتھ کے سامان سے زیادہ اہم ہے۔"},
    {en:"Today her paintings hang in world museums. She tells young artists: 'Don't wait for perfect conditions. Start with what you have. Passion beats any material.'",ur:"آج دنیا کے عجائب گھروں میں۔ نوجوانوں سے: 'کامل حالات کا انتظار نہ کرو۔ جو ہے اسی سے شروع کرو۔'"},
    {en:"Aisha's school of free art now has 2,000 students. Her first wall painting still stands in her village — tourists come from around the world to see where art was born from nothing. 🎨",ur:"عائشہ کے مفت آرٹ اسکول میں ۲۰۰۰ طلباء ہیں۔ اس کی پہلی دیوار نقاشی اب بھی گاؤں میں ہے — دنیا بھر سے سیاح آتے ہیں یہ دیکھنے کہ کچھ نہیں سے فن کیسے پیدا ہوا۔ 🎨"},
   ]},
  {id:12,type:"success",emoji:"💎",titleEn:"The Hidden Treasure",titleUr:"چھپا ہوا خزانہ",level:"Advanced",
   pages:[
    {en:"An ancient pirate map was found in a chest. Many brave adventurers tried to find the treasure — all failed. The island was protected by storms and wild animals.",ur:"پرانا نقشہ۔ بہت سے بہادروں نے خزانہ تلاش کیا — سب ناکام۔ جزیرہ طوفانوں سے محفوظ۔"},
    {en:"A poor fisherman tried too. Everyone laughed. But he sailed through storms, hunger, and fear. He never looked back. He never gave up.",ur:"ایک غریب ماہی گیر نے بھی کوشش کی۔ سب ہنسے۔ لیکن طوفان، بھوک، ڈر — پھر بھی نہ رکا۔"},
    {en:"He found the treasure — but it was something unexpected: a school! The 'gold' was 1,000 years of knowledge: maps, books, science. The real treasure was wisdom, not coins.",ur:"خزانہ ملا — لیکن غیر متوقع: ایک اسکول! 'سونا' علم تھا۔ اصل خزانہ حکمت تھی، سونا نہیں۔"},
    {en:"He brought the books back and started a free school. His village produced 50 doctors, 30 engineers, and 3 scientists — all from one fisherman who dared to sail into the storm. 💎",ur:"کتابیں لایا، مفت اسکول بنایا۔ گاؤں سے ۵۰ ڈاکٹر، ۳۰ انجینئر، ۳ سائنسدان — سب ایک ماہی گیر سے جو طوفان میں جانے کی ہمت رکھتا تھا۔ 💎"},
   ]},
  // ===== HORROR STORIES 👻 =====
  {id:30,type:"horror",emoji:"👻",titleEn:"The Empty Classroom",titleUr:"خالی کلاس روم",level:"Intermediate",
   pages:[
    {en:"Every night at 11 PM, the school lights turned on by themselves. The janitor heard chalk writing on the blackboard — but no one was there. He told no one. He was afraid they wouldn't believe him.",ur:"ہر رات گیارہ بجے اسکول کی لائٹیں خود جل جاتیں۔ چوکیدار نے بلیک بورڈ پر چاک چلنے کی آواز سنی — لیکن کوئی نہ تھا۔ اس نے کسی کو نہ بتایا۔ ڈر تھا کہ یقین نہ کریں۔"},
    {en:"One brave student, Ali, stayed late to investigate. He crept into the dark corridor. The classroom door swung open on its own. Written on the board: 'FINISH YOUR HOMEWORK'.",ur:"ایک بہادر طالب علم علی دیر تک رکا تاکہ جانچ کر سکے۔ اندھیرے گلیارے میں آیا۔ کلاس روم کا دروازہ خود کھل گیا۔ بورڈ پر لکھا تھا: 'اپنا ہوم ورک مکمل کرو'۔"},
    {en:"Ali screamed and ran. The next morning, the teacher found every student's name written on the board with checkmarks — only the students who hadn't done homework had question marks. 👻",ur:"علی چیخا اور بھاگا۔ اگلی صبح استاد نے بورڈ پر ہر طالب علم کا نام دیکھا — جنہوں نے ہوم ورک نہیں کیا ان کے نام پر سوالیہ نشان تھا۔ 👻"},
    {en:"No one ever found out who wrote it. But from that night, every student in that school always — ALWAYS — did their homework. Sometimes the best teachers are the ones you never see. 📚",ur:"کبھی پتہ نہ چلا کہ کس نے لکھا۔ لیکن اس رات کے بعد، اس اسکول کا ہر طالب علم ہمیشہ ہوم ورک کرنے لگا۔ کبھی کبھی سب سے اچھے استاد وہ ہوتے ہیں جو نظر نہیں آتے۔ 📚"},
   ]},
  {id:31,type:"horror",emoji:"🕯️",titleEn:"The Candle That Never Dies",titleUr:"بجھنے والی شمع",level:"Advanced",
   pages:[
    {en:"In an old haveli, a candle had burned for one hundred years. No one dared blow it out — the elders said: 'The day it dies, something will return.' No one knew what.",ur:"ایک پرانی حویلی میں ایک شمع سو سال سے جل رہی تھی۔ کوئی بجھانے کی ہمت نہ رکھتا — بزرگ کہتے: 'جس دن بجھے، کچھ واپس آئے گا۔' کوئی نہیں جانتا تھا کیا۔"},
    {en:"A young girl named Hina, curious and fearless, blew it out one stormy night. The room turned ice cold. Shadows moved on the walls. A voice whispered her name — twice.",ur:"ایک نوجوان لڑکی ہنا، جوش اور بے خوفی سے، ایک طوفانی رات اسے بجھا دیا۔ کمرہ برف جیسا ٹھنڈا ہو گیا۔ دیواروں پر سائے ہلے۔ ایک آواز نے اس کا نام پکارا — دو بار۔"},
    {en:"From the shadows emerged not a monster — but an old woman, transparent as glass. 'Finally,' she whispered. 'I waited one hundred years for someone brave enough to free me.'",ur:"سایوں سے کوئی عفریت نہیں نکلا — بلکہ ایک بوڑھی عورت، شیشے جیسی شفاف۔ 'آخرکار'، وہ بولی۔ 'میں سو سال سے کسی بہادر کا انتظار کر رہی تھی جو مجھے آزاد کرے'۔"},
    {en:"She smiled and dissolved into golden light. The candle never burned again. But every night, golden sparks danced in that room — the old woman's grateful goodbye. 🕯️✨",ur:"وہ مسکرائی اور سنہری روشنی میں ضم ہو گئی۔ شمع کبھی نہ جلی۔ لیکن ہر رات، اس کمرے میں سنہری چنگاریاں ناچتیں — بوڑھی عورت کا شکرگزار الوداع۔ 🕯️✨"},
   ]},
  {id:32,type:"horror",emoji:"🌑",titleEn:"The Mirror at Midnight",titleUr:"آدھی رات کا آئینہ",level:"Advanced",
   pages:[
    {en:"Grandmother warned: 'Never look in the old mirror after midnight.' Omar laughed. He was thirteen and believed in nothing. On his birthday night, he looked anyway.",ur:"دادی نے خبردار کیا: 'آدھی رات کے بعد پرانے آئینے میں کبھی نہ دیکھنا۔' عمر ہنسا۔ تیرہ سال کا تھا اور کسی چیز پر یقین نہ تھا۔ اپنی سالگرہ کی رات اس نے پھر بھی دیکھا۔"},
    {en:"His reflection did not copy him. It stood still — smiling — while Omar moved. Then it raised one finger slowly, pointed at Omar, and mouthed: 'Your turn.'",ur:"اس کا عکس نقل نہیں کر رہا تھا۔ وہ خاموش کھڑا تھا — مسکراتا ہوا — جبکہ عمر حرکت کر رہا تھا۔ پھر عکس نے آہستہ ایک انگلی اٹھائی، عمر کی طرف اشارہ کیا، اور ہونٹ ہلائے: 'تمہاری باری'۔"},
    {en:"Omar ran. But every mirror in the house showed the same smiling reflection that night. He covered them all. He slept with the lights on for a week.",ur:"عمر بھاگا۔ لیکن اس رات گھر کے ہر آئینے میں وہی مسکراتا عکس تھا۔ اس نے سب ڈھانپ دیے۔ ہفتہ بھر لائٹ جلا کر سویا۔"},
    {en:"Years later, Omar became Pakistan's greatest horror writer. He dedicated his first book: 'To the mirror that started everything.' Sometimes our fears become our greatest gifts. 🌑📖",ur:"سالوں بعد، عمر پاکستان کا مشہور ترین ہارر لکھاری بنا۔ پہلی کتاب کا انتساب: 'اس آئینے کے نام جس نے سب شروع کیا'۔ کبھی کبھی ہمارا ڈر ہماری سب سے بڑی نعمت بن جاتا ہے۔ 🌑📖"},
   ]},
  // ===== MOTIVATION STORIES 💪 =====
  {id:40,type:"motivation",emoji:"🔥",titleEn:"Zero to Hero",titleUr:"صفر سے شیر",level:"Intermediate",
   pages:[
    {en:"Tariq failed his matric three times. Three years. Three humiliations. His father stopped talking to him. His friends moved on. Tariq sat alone thinking he was worthless.",ur:"طارق نے تین بار میٹرک فیل کیا۔ تین سال۔ تین ذلتیں۔ باپ نے بات کرنا بند کر دی۔ دوست آگے چلے گئے۔ طارق اکیلا بیٹھ سوچتا — میں بیکار ہوں۔"},
    {en:"A stranger in a tea shop said: 'How many times has the sun failed to rise? Zero. Be the sun. Rise anyway.' Tariq wrote that on his hand and never washed it off.",ur:"چائے کی دکان پر ایک انجان نے کہا: 'سورج کتنی بار طلوع ہونے میں ناکام ہوا؟ صفر۔ سورج بن۔ پھر بھی اٹھ'۔ طارق نے یہ ہاتھ پر لکھا اور کبھی نہ مٹایا۔"},
    {en:"Fourth attempt — 85%. Fifth year — top of his city. He kept the old failure papers framed on his wall. 'These,' he said, 'are my real degrees. They taught me what no school can.'",ur:"چوتھی بار — ۸۵٪۔ پانچویں سال — شہر میں اول۔ پرانے فیل کاغذ فریم کر کے دیوار پر لگائے۔ 'یہ'، کہتا، 'میری اصلی ڈگریاں ہیں۔ یہ وہ سکھاتے ہیں جو کوئی اسکول نہیں سکھا سکتا'۔"},
    {en:"Tariq now runs a coaching academy for students who failed. His motto: 'Fail loudly. Learn quietly. Win permanently.' 500 students passed through his doors last year alone. 🔥",ur:"طارق اب فیل طلباء کے لیے اکیڈمی چلاتا ہے۔ اس کا نعرہ: 'زور سے فیل ہو۔ خاموشی سے سیکھو۔ ہمیشہ کے لیے جیتو'۔ گزشتہ سال اکیلے ۵۰۰ طلباء اس کے دروازے سے گزرے۔ 🔥"},
   ]},
  {id:41,type:"motivation",emoji:"⚡",titleEn:"The Comeback",titleUr:"واپسی",level:"Beginner",
   pages:[
    {en:"Saima lost her eyesight at age ten. Darkness everywhere. She cried for weeks. But then she heard a blind pianist on the radio playing the most beautiful music she'd ever heard.",ur:"سائمہ نے دس سال کی عمر میں بینائی کھو دی۔ ہر طرف اندھیرا۔ ہفتوں روئی۔ لیکن پھر ریڈیو پر نابینا پیانسٹ کی موسیقی سنی — زندگی کی سب سے خوبصورت دھن۔"},
    {en:"She said: 'If he can make beauty in darkness, so can I.' She learned Braille in six months, piano in one year, and started teaching music to blind children.",ur:"اس نے کہا: 'اگر وہ اندھیرے میں خوبصورتی بنا سکتا ہے، تو میں بھی'۔ چھ ماہ میں بریل سیکھا، ایک سال میں پیانو، اور نابینا بچوں کو موسیقی سکھانی شروع کی۔"},
    {en:"At twenty, she performed at the National Music Hall. Three thousand people stood and cried. She couldn't see the applause — but she felt every single heartbeat in that room.",ur:"بیس سال کی عمر میں نیشنل میوزک ہال میں پرفارم کیا۔ تین ہزار لوگ کھڑے ہو کر روئے۔ وہ تالیاں نہ دیکھ سکی — لیکن اس کمرے کی ہر دھڑکن محسوس کی۔"},
    {en:"Saima says: 'I didn't lose my sight. I gained a different vision — one that sees the music in everything.' Your limitation might be your greatest instrument. ⚡🎹",ur:"سائمہ کہتی ہے: 'میں نے بینائی نہیں کھوئی۔ ایک مختلف نظر پائی — جو ہر چیز میں موسیقی دیکھتی ہے'۔ تمہاری کمزوری تمہارا سب سے بڑا آلہ ہو سکتی ہے۔ ⚡🎹"},
   ]},
  {id:42,type:"motivation",emoji:"🏔️",titleEn:"The Mountain Boy",titleUr:"پہاڑی لڑکا",level:"Intermediate",
   pages:[
    {en:"Imran lived in a mountain village with no school for 40 kilometers. Every morning at 4 AM, he walked through snow, rain, and heat to reach the school. Three years, every single day.",ur:"عمران پہاڑی گاؤں میں رہتا تھا، چالیس کلومیٹر دور کوئی اسکول نہ تھا۔ ہر صبح چار بجے، برف، بارش، گرمی میں چل کر اسکول پہنچتا۔ تین سال، ہر ایک دن۔"},
    {en:"Teachers asked: 'Why do you walk so far?' Imran replied: 'Because knowledge is the only thing no flood can wash away, no thief can steal, no earthquake can destroy.'",ur:"اساتذہ نے پوچھا: 'اتنا دور کیوں چلتے ہو؟' عمران بولا: 'کیونکہ علم واحد چیز ہے جسے کوئی سیلاب نہیں بہا سکتا، کوئی چور نہیں چرا سکتا، کوئی زلزلہ نہیں تباہ کر سکتا'۔"},
    {en:"He won a national scholarship, studied engineering, and came back — not to the city, but to his mountain. He built a school, a road, and a hospital for his village.",ur:"قومی وظیفہ جیتا، انجینئرنگ پڑھی، اور واپس آیا — شہر نہیں، اپنے پہاڑ پر۔ گاؤں کے لیے اسکول، سڑک اور ہسپتال بنایا۔"},
    {en:"His village now has electricity, internet, and 300 students in school. Imran always says: 'Every step I walked, I carried my village on my back.' 🏔️🌟",ur:"گاؤں میں اب بجلی، انٹرنیٹ، اور تین سو طلباء اسکول میں ہیں۔ عمران ہمیشہ کہتا ہے: 'جو قدم میں نے چلے، ہر قدم میں گاؤں کو پیٹھ پر اٹھائے چلا'۔ 🏔️🌟"},
   ]},
  {id:43,type:"motivation",emoji:"🌱",titleEn:"Start Where You Are",titleUr:"جہاں ہو وہیں سے شروع کرو",level:"Beginner",
   pages:[
    {en:"Razia had no computer, no books, no teacher. Just a cracked phone with 2G internet. She thought: 'Everyone else has more. I can't compete.'",ur:"رضیہ کے پاس نہ کمپیوٹر، نہ کتابیں، نہ استاد۔ صرف پھٹا ہوا فون اور ٹو جی انٹرنیٹ۔ سوچتی: 'سب کے پاس زیادہ ہے۔ میں مقابلہ نہیں کر سکتی'۔"},
    {en:"A quote changed everything: 'Don't compare your chapter one to someone else's chapter ten.' Razia stopped comparing and started learning — one YouTube video at a time.",ur:"ایک بات نے سب بدل دیا: 'اپنے پہلے باب کا موازنہ کسی کے دسویں باب سے نہ کرو'۔ رضیہ نے موازنہ بند کیا اور سیکھنا شروع کیا — ایک یوٹیوب ویڈیو ایک وقت میں۔"},
    {en:"Two years later, she had 50,000 followers on YouTube teaching coding in Urdu — using that same cracked phone. The phone never changed. Only her belief changed.",ur:"دو سال بعد، یوٹیوب پر پچاس ہزار فالوورز تھے جو اردو میں کوڈنگ سیکھتے تھے — اسی پھٹے فون سے۔ فون نہیں بدلا۔ صرف اس کا یقین بدلا۔"},
    {en:"Razia's rule: 'Use what you have. Start where you are. The world doesn't wait for perfect conditions — and neither should you.' 🌱💡",ur:"رضیہ کا اصول: 'جو ہے وہ استعمال کرو۔ جہاں ہو وہیں سے شروع کرو۔ دنیا کامل حالات کا انتظار نہیں کرتی — تم بھی نہ کرو'۔ 🌱💡"},
   ]},
  {id:44,type:"motivation",emoji:"💎",titleEn:"Pressure Makes Diamonds",titleUr:"دباؤ ہیرے بناتا ہے",level:"Advanced",
   pages:[
    {en:"Kamran was told by every teacher: 'You are not smart enough.' His IQ test came back average. Average students don't become great, they said. He believed them for years.",ur:"ہر استاد نے کہا: 'تم کافی ذہین نہیں'۔ IQ ٹیسٹ اوسط آیا۔ اوسط طلباء عظیم نہیں بنتے، انہوں نے کہا۔ وہ سالوں تک مانتا رہا۔"},
    {en:"Then he read about Einstein, Edison, Darwin — all labeled 'slow' or 'not suitable for school.' He understood: labels are paper. Effort is steel.",ur:"پھر انہوں نے آئنسٹائن، ایڈیسن، ڈارون کے بارے میں پڑھا — سب کو 'سست' یا 'اسکول کے لیے نامناسب' کہا گیا تھا۔ سمجھا: لیبل کاغذ ہیں۔ محنت فولاد ہے۔"},
    {en:"Kamran studied 6 hours every night for two years while working as a waiter. He became a software engineer at 26. Then founded a company. Then employed his old teachers.",ur:"کامران نے بطور ویٹر کام کرتے ہوئے دو سال ہر رات چھ گھنٹے پڑھا۔ چھبیس سال میں سافٹ ویئر انجینئر بنا۔ پھر کمپنی بنائی۔ پھر اپنے پرانے اساتذہ کو ملازم رکھا۔"},
    {en:"His company motto: 'Diamonds are made under pressure.' He hired only students that other companies rejected. Every single one proved the world wrong. 💎🔥",ur:"کمپنی کا نعرہ: 'ہیرے دباؤ میں بنتے ہیں'۔ صرف وہ طلباء رکھے جنہیں دوسری کمپنیوں نے رد کیا تھا۔ ہر ایک نے دنیا کو غلط ثابت کیا۔ 💎🔥"},
   ]},
  // ===== KIDS STORIES 👶 =====
  {id:50,type:"kids",emoji:"🐢",titleEn:"Titu the Turtle",titleUr:"کچھوا ٹیٹو",level:"Beginner",
   pages:[
    {en:"Titu the turtle was very, very slow. The rabbit laughed: 'You'll never win anything!' Titu smiled: 'I don't race against others. I race against yesterday's me.'",ur:"ٹیٹو کچھوا بہت بہت آہستہ تھا۔ خرگوش ہنسا: 'تم کبھی کچھ نہیں جیتو گے!' ٹیٹو مسکرایا: 'میں دوسروں سے نہیں دوڑتا۔ کل والے اپنے آپ سے دوڑتا ہوں'۔"},
    {en:"Every day Titu walked a little farther than yesterday. Rain or sun — he always kept going. He collected colorful leaves, helped lost ants, sang songs to flowers.",ur:"ہر روز ٹیٹو کل سے تھوڑا آگے چلتا۔ بارش ہو یا دھوپ — ہمیشہ چلتا رہتا۔ رنگین پتے جمع کرتا، گمشدہ چیونٹیوں کی مدد کرتا، پھولوں کو گانے سناتا۔"},
    {en:"At the end of the year, the whole forest voted: 'Who travelled the farthest?' Not the rabbit. Not the deer. Titu — because he never stopped. 🐢🎉",ur:"سال کے آخر میں جنگل نے ووٹ دیا: 'سب سے زیادہ کون چلا؟' خرگوش نہیں۔ ہرن نہیں۔ ٹیٹو — کیونکہ وہ کبھی نہیں رکا۔ 🐢🎉"},
    {en:"Titu's lesson for all children: 'Slow is not wrong. Quitting is wrong. Keep going at YOUR pace and you will reach YOUR destination. The finish line is always there, waiting for you!' 🌈",ur:"ٹیٹو کا سب بچوں کے لیے سبق: 'آہستہ غلط نہیں۔ چھوڑنا غلط ہے۔ اپنی رفتار سے چلو اور اپنی منزل پہنچو۔ اختتام ہمیشہ موجود ہے، تمہارا انتظار کرتا ہے!' 🌈"},
   ]},
  {id:51,type:"kids",emoji:"🌈",titleEn:"The Rainbow Painter",titleUr:"قوس قزح پینٹر",level:"Beginner",
   pages:[
    {en:"Little Zara asked: 'Mama, who paints the rainbow?' Mama smiled: 'The clouds cry tears, the sun hugs them — and together they make the rainbow. Even in nature, teamwork creates beauty.'",ur:"چھوٹی زارا نے پوچھا: 'ماما، قوس قزح کون پینٹ کرتا ہے؟' ماما مسکرائی: 'بادل آنسو بہاتے ہیں، سورج انہیں گلے لگاتا ہے — اور مل کر قوس قزح بنتی ہے۔ فطرت میں بھی مل کر کام خوبصورتی بناتا ہے'۔"},
    {en:"Zara ran to school and told everyone. Her class painted one huge rainbow together — each child adding one color. No one's color looked pretty alone, but together it was magical.",ur:"زارا بھاگ کر اسکول گئی اور سب کو بتایا۔ کلاس نے مل کر ایک بڑی قوس قزح پینٹ کی — ہر بچے نے ایک رنگ لگایا۔ کسی کا رنگ اکیلے خوبصورت نہ لگا، لیکن مل کر جادوئی تھا۔"},
    {en:"The painting won first prize. But more important: Zara learned that every person is one color of the world's rainbow. You need ALL colors to make something beautiful. 🌈",ur:"پینٹنگ نے پہلا انعام جیتا۔ لیکن اہم بات: زارا نے سیکھا کہ ہر انسان دنیا کی قوس قزح کا ایک رنگ ہے۔ خوبصورتی بنانے کے لیے سارے رنگ چاہیے۔ 🌈"},
   ]},
  {id:52,type:"kids",emoji:"🦜",titleEn:"Momo the Talking Parrot",titleUr:"باتونی طوطا موموؐ",level:"Beginner",
   pages:[
    {en:"Momo the parrot could talk but said only one word: 'Why?' He asked it all day. 'Why is the sky blue? Why do cats say meow? Why do we sleep?' Everyone got tired of him.",ur:"موموؐ طوطا بول سکتا تھا لیکن صرف ایک لفظ: 'کیوں؟' سارا دن پوچھتا۔ 'آسمان نیلا کیوں؟ بلیاں میاؤں کیوں کہتی ہیں؟ ہم سوتے کیوں ہیں؟' سب تھک جاتے۔"},
    {en:"A wise old owl said: 'Momo, your 'why' is a superpower. Never stop asking.' Momo became a scientist-parrot who solved the mystery of why birds sing at sunrise.",ur:"بزرگ الو نے کہا: 'موموؐ، تمہارا 'کیوں' سپر پاور ہے۔ پوچھنا کبھی بند نہ کرو'۔ موموؐ سائنسدان طوطا بنا جس نے صبح کے وقت پرندوں کے گانے کا راز حل کیا۔"},
    {en:"The answer? Birds sing at sunrise to say: 'I'm alive! I'm here! The night was dark but I made it!' Momo cried — he finally understood why asking 'why' was the most important thing. 🦜",ur:"جواب؟ پرندے طلوع آفتاب پر اس لیے گاتے ہیں: 'میں زندہ ہوں! میں یہاں ہوں! رات اندھیری تھی لیکن میں بچ گیا!' موموؐ رویا — آخرکار سمجھا کیوں 'کیوں' پوچھنا سب سے اہم ہے۔ 🦜"},
    {en:"Children: never stop asking WHY. Every scientist, every inventor, every great person started with that one small word: WHY? Your curiosity is your greatest gift! 🌟",ur:"بچو: 'کیوں' پوچھنا کبھی بند نہ کرو۔ ہر سائنسدان، ہر موجد، ہر عظیم انسان نے اسی ایک چھوٹے لفظ سے شروع کیا: کیوں؟ تمہاری جستجو تمہارا سب سے بڑا تحفہ ہے! 🌟"},
   ]},
  // ===== ISLAMIC STORIES 🕌 =====
  {id:60,type:"islamic",emoji:"🕌",titleEn:"The Honest Merchant",titleUr:"سچا تاجر",level:"Intermediate",
   pages:[
    {en:"In old Baghdad, merchant Abdullah found a bag of gold coins left by a traveler. He could have kept it — no one saw him. But he said: 'Allah saw me. That is enough.'",ur:"پرانے بغداد میں تاجر عبداللہ کو ایک مسافر کا سونے کا تھیلہ ملا۔ رکھ سکتا تھا — کسی نے نہ دیکھا۔ لیکن بولا: 'اللہ نے دیکھا۔ بس یہی کافی ہے'۔"},
    {en:"He waited three days in the market calling out: 'Who lost gold?' People thought he was foolish. But on the fourth day, a weeping father came — it was his family's savings for medicine.",ur:"تین دن بازار میں پکارتا رہا: 'کس کا سونا گم ہوا؟' لوگ بے وقوف سمجھتے۔ لیکن چوتھے دن ایک روتا باپ آیا — یہ دوا کے لیے گھر کی جمع پونجی تھی۔"},
    {en:"The father tried to give Abdullah half the gold as thanks. Abdullah refused: 'The reward of honesty is already in my heart. Allah's pleasure is worth more than all the gold in Baghdad.'",ur:"باپ نے شکریے میں آدھا سونا دینا چاہا۔ عبداللہ نے انکار کیا: 'دیانتداری کا صلہ میرے دل میں ہے۔ اللہ کی رضا بغداد کے سارے سونے سے زیادہ قیمتی ہے'۔"},
    {en:"That child survived. He grew up to become a doctor who saved thousands. Because one man chose honesty over gold. One right choice echoes through generations. 🕌✨",ur:"وہ بچہ بچ گیا۔ بڑا ہو کر ڈاکٹر بنا جس نے ہزاروں کو بچایا۔ کیونکہ ایک آدمی نے سونے کی جگہ دیانتداری چنی۔ ایک صحیح فیصلہ نسلوں تک گونجتا ہے۔ 🕌✨"},
   ]},
  {id:61,type:"islamic",emoji:"🌙",titleEn:"The Night of Gratitude",titleUr:"شکر کی رات",level:"Beginner",
   pages:[
    {en:"Young Yusuf complained every night: 'I have no toys, no new clothes, no big house.' His grandmother listened patiently for a week. Then one night, she took him to the rooftop.",ur:"چھوٹا یوسف ہر رات شکایت کرتا: 'نہ کھلونے، نہ نئے کپڑے، نہ بڑا گھر'۔ دادی ایک ہفتہ صبر سے سنتی رہیں۔ پھر ایک رات چھت پر لے گئیں۔"},
    {en:"'Count the stars,' she said. He counted — too many. 'Now count your blessings.' He tried: eyes to see stars, legs to climb, a grandmother who loves, a heart that beats. He ran out of fingers.",ur:"'ستارے گنو'، اس نے کہا۔ گنے — بہت زیادہ۔ 'اب نعمتیں گنو'۔ کوشش کی: ستارے دیکھنے کو آنکھیں، چڑھنے کو ٹانگیں، پیار کرنے والی دادی، دھڑکنے والا دل۔ انگلیاں ختم ہو گئیں۔"},
    {en:"'Alhamdulillah,' he whispered for the first time and truly meant it. That night, for the first time, he slept without one complaint — and woke up the happiest he'd ever been.",ur:"'الحمدللہ'، اس نے پہلی بار کہا اور سچ میں مانا۔ اس رات پہلی بار ایک شکایت کے بغیر سویا — اور اٹھا تو اپنی زندگی میں سب سے خوش تھا۔"},
    {en:"Yusuf grew up to be a man who found joy in everything. His secret: every morning, before anything else, he said 'Alhamdulillah' — and meant it. Gratitude is the key to happiness. 🌙🌟",ur:"یوسف بڑا ہوا ایسا انسان جسے ہر چیز میں خوشی ملتی۔ اس کا راز: ہر صبح، سب سے پہلے، 'الحمدللہ' کہتا — اور سچ میں مانتا۔ شکر خوشی کی چابی ہے۔ 🌙🌟"},
   ]},
  {id:62,type:"islamic",emoji:"🤝",titleEn:"The Neighbour's Right",titleUr:"پڑوسی کا حق",level:"Intermediate",
   pages:[
    {en:"The Prophet ﷺ said: 'Jibril kept advising me about the neighbor until I thought he might be given a share of inheritance.' Omar's family never forgot this hadith.",ur:"نبی ﷺ نے فرمایا: 'جبریل مجھے پڑوسی کے بارے میں وصیت کرتے رہے یہاں تک کہ میں نے سوچا شاید انہیں وراثت میں حصہ دیا جائے'۔ عمر کے گھر والے یہ حدیث کبھی نہ بھولے۔"},
    {en:"Their neighbor was poor, sick, and alone. Omar's family cooked double food every day. When the neighbor's child cried at night, they stayed awake. This went on for seven years.",ur:"ان کا پڑوسی غریب، بیمار اور اکیلا تھا۔ عمر کے گھر میں ہر روز دوگنا کھانا پکتا۔ جب پڑوسی کا بچہ رات کو روتا تو جاگتے رہتے۔ سات سال یہ سلسلہ جاری رہا۔"},
    {en:"When the neighbor passed away, he left a letter: 'I was going to leave this city because of loneliness. Then this family arrived. They were my reason to stay alive.'",ur:"جب پڑوسی نے وفات پائی تو خط چھوڑا: 'میں تنہائی کی وجہ سے یہ شہر چھوڑنے والا تھا۔ پھر یہ خاندان آیا۔ یہ میرے جینے کی وجہ تھے'۔"},
    {en:"Omar's children tell this story to their children. The hadith became alive in their home. Islam is not just prayer and fasting — it's the warmth you give the person next door. 🤝🕌",ur:"عمر کے بچے یہ کہانی اپنے بچوں کو سناتے ہیں۔ حدیث ان کے گھر میں زندہ ہو گئی۔ اسلام صرف نماز اور روزہ نہیں — یہ وہ گرمجوشی ہے جو پڑوسی کو دیتے ہو۔ 🤝🕌"},
   ]},
  {id:63,type:"islamic",emoji:"📖",titleEn:"The Boy Who Memorized the Quran",titleUr:"قرآن حفظ کرنے والا لڑکا",level:"Advanced",
   pages:[
    {en:"Hassan was eight years old when he started memorizing the Quran. Some days were hard — the words blurred, the mind tired. His teacher said: 'Every ayah you memorize is a light entering your heart.'",ur:"حسن نے آٹھ سال کی عمر میں قرآن حفظ کرنا شروع کیا۔ کچھ دن کٹھن تھے — الفاظ دھندلے، ذہن تھکا۔ استاد نے کہا: 'ہر آیت جو تم حفظ کرتے ہو دل میں داخل ہونے والی روشنی ہے'۔"},
    {en:"Three years of waking at Fajr, repeating verses in every quiet moment. In the market, in the garden, before sleep. The Quran wove itself into every breath he took.",ur:"تین سال فجر میں اٹھنا، ہر خاموش لمحے میں آیات دہرانا۔ بازار میں، باغ میں، سونے سے پہلے۔ قرآن اس کی ہر سانس میں بُن گیا۔"},
    {en:"At eleven, Hassan became a Hafiz. His mother's tears of joy fell as he recited the last surah. His father said: 'You have built a palace in Jannah — for yourself and for us.'",ur:"گیارہ سال میں حسن حافظ بنا۔ جب اس نے آخری سورت پڑھی تو ماں کے آنسو خوشی سے گرے۔ باپ نے کہا: 'تم نے جنت میں محل بنایا — اپنے لیے اور ہمارے لیے'۔"},
    {en:"Hassan is now 25 and teaches Quran to 40 children. He says: 'The Quran gave me more than memory — it gave me peace no exam result, no money, and no title can ever give.' 📖🌙",ur:"حسن اب پچیس سال کا ہے اور چالیس بچوں کو قرآن سکھاتا ہے۔ کہتا ہے: 'قرآن نے مجھے یاد سے زیادہ دیا — وہ سکون دیا جو کوئی نتیجہ، پیسہ اور لقب نہیں دے سکتا'۔ 📖🌙"},
   ]},
  {id:64,type:"islamic",emoji:"🌺",titleEn:"Kindness is Ibadah",titleUr:"مہربانی عبادت ہے",level:"Beginner",
   pages:[
    {en:"The Prophet ﷺ saw a man giving water to a thirsty dog. He said: 'In every living being, there is a reward for kindness.' That moment changed how Bilal saw the world.",ur:"نبی ﷺ نے ایک آدمی کو پیاسے کتے کو پانی پلاتے دیکھا۔ فرمایا: 'ہر جاندار میں نیکی کا صلہ ہے'۔ اس لمحے نے بلال کی دنیا بدل دی۔"},
    {en:"From that day, Bilal helped every creature he met. A stray cat in rain, an ant carrying a crumb, a bird with a broken wing. Each small act felt like a prayer.",ur:"اس دن سے بلال نے ہر جاندار کی مدد کی۔ بارش میں آوارہ بلی، ٹکڑا اٹھاتی چیونٹی، ٹوٹے پر والا پرندہ۔ ہر چھوٹا کام نماز جیسا لگتا۔"},
    {en:"His classmates laughed: 'You waste time on animals!' Bilal replied: 'The Prophet ﷺ never wasted kindness. Neither will I.' Soon, the mockers started helping too.",ur:"ہم جماعتوں نے ہنسا: 'جانوروں پر وقت ضائع کرتے ہو!' بلال نے کہا: 'نبی ﷺ نے مہربانی کبھی ضائع نہیں کی۔ میں بھی نہیں کروں گا'۔ جلد مذاق اڑانے والے بھی مدد کرنے لگے۔"},
    {en:"Bilal became a veterinarian and opened Pakistan's first free animal hospital. He says: 'I was looking for Allah's pleasure. I found it in the eyes of every creature I helped.' 🌺🤝",ur:"بلال جانوروں کا ڈاکٹر بنا اور پاکستان کا پہلا مفت جانوروں کا ہسپتال کھولا۔ کہتا ہے: 'میں اللہ کی رضا ڈھونڈ رہا تھا۔ ہر جاندار کی آنکھوں میں مل گئی'۔ 🌺🤝"},
   ]},

    useEffect(()=>{endRef.current?.scrollIntoView({behavior:"smooth"});},[msgs,loading]);
    const speakMsg=(text)=>{
      if(!window.speechSynthesis)return;
      window.speechSynthesis.cancel();
      const isUrdu=/[\u0600-\u06FF]/.test(text);
      const clean=isUrdu?text:text.split("🕌")[0].trim();
      const u=new SpeechSynthesisUtterance(clean||text);
      u.lang=isUrdu?"ur-PK":"en-US"; u.rate=0.86; u.pitch=1.05; u.volume=1;
      const vs=window.speechSynthesis.getVoices();
      const v=vs.find(x=>x.lang===u.lang)||vs.find(x=>x.lang.startsWith(u.lang.split("-")[0]));
      if(v)u.voice=v;
      window.speechSynthesis.speak(u);
    };
    const send=async(override)=>{
      const text=(override||input).trim();
      if(!text||loading)return;
      setInput("");
      const newMsgs=[...msgs,{r:"user",t:text}];
      updateMsgs(newMsgs);
      setLoading(true);
      try{
        const history=newMsgs.slice(-10).map(m=>({role:m.r==="ai"?"assistant":"user",content:m.t}));
        const reply=await callAI(history);
        updateMsgs(m=>[...m,{r:"ai",t:reply}]);
        setXp(x=>x+10);
      }catch(e){
        updateMsgs(m=>[...m,{r:"ai",t:"Oops! 🐼\n\n🕌 اردو: دوبارہ کوشش کریں!"}]);

      setLoading(false);

      r.lang=lang==="ur"?"ur-PK":"en-US"; r.continuous=false; r.interimResults=false;
      r.onstart=()=>setIsRec(true);
      r.onresult=(e)=>{const t=e.results[0][0].transcript;setIsRec(false);send(t);};
      r.onend=()=>setIsRec(false); r.onerror=()=>setIsRec(false);
      recRef.current=r; r.start();
    };
    const stopRec=()=>{recRef.current?.stop();setIsRec(false);};

  const TranslatorPage=()=>{
    const [inputText,setInputText]=React.useState("");
    const [outputText,setOutputText]=React.useState("");
    const [mode,setMode]=React.useState("en-ur"); // en-ur or ur-en
    const [loading,setLoading]=React.useState(false);
    const [charCount,setCharCount]=React.useState(0);

    const isEnToUr = mode==="en-ur";
    const fromLang = isEnToUr?"en":"ur";
    const toLang   = isEnToUr?"ur":"en";

    const translate=async()=>{
      if(!inputText.trim()){return;}
      setLoading(true);
      setOutputText("");

      const translateText=async(text)=>{
        if(!text) return "Please enter text";

        // Try 1: MyMemory API (CORS-safe, no key needed)
        try{
          const langPair = isEnToUr ? "en|ur" : "ur|en";
          const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${langPair}`;
          const response = await fetch(url);
          if(!response.ok) throw new Error('Network response was not ok');
          const data = await response.json();
          if(data?.responseStatus===200 && data?.responseData?.translatedText){
            return data.responseData.translatedText;
          }
          throw new Error('Bad response');
        }catch(err1){
          // Try 2: Google Translate via allorigins CORS proxy
          try{
            const sl = isEnToUr ? "en" : "ur";
            const tl = isEnToUr ? "ur" : "en";
            const googleUrl = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${sl}&tl=${tl}&dt=t&q=${encodeURIComponent(text)}`;
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(googleUrl)}`;
            const response = await fetch(proxyUrl);
            if(!response.ok) throw new Error('Network response was not ok');
            const raw = await response.json();
            const data = JSON.parse(raw.contents);

            // Aapka exact logic — data[0] se tamam pieces jorna
            let translatedResult = "";
            data[0].forEach(item => {
              if(item[0]) translatedResult += item[0];
            });
            if(translatedResult) return translatedResult;
            throw new Error('Empty result');
          }catch(err2){
            console.error("Translation Error:", err2);
            return isRTL
              ? "ترجمہ کرنے میں دشواری پیش آ رہی ہے، دوبارہ کوشش کریں"
              : "Translation failed — please try again";
          }
        }
      };

      const result = await translateText(inputText);
      setOutputText(result);
      if(!result.includes("failed") && !result.includes("دشواری")){
        setStars(s=>s+1);
        setXp(x=>x+10);
      }
      setLoading(false);
    };

    const speakText=(text,lang)=>{
      window.speechSynthesis.cancel();
      const u=new SpeechSynthesisUtterance(text);
      u.lang=lang==="ur"?"ur-PK":"en-US";
      u.rate=0.88; u.pitch=1.05;
      window.speechSynthesis.speak(u);
    };

    const swapLangs=()=>{
      setMode(m=>m==="en-ur"?"ur-en":"en-ur");
      setInputText(outputText);
      setOutputText(inputText);
    };

    const clearAll=()=>{setInputText("");setOutputText("");setCharCount(0);};

    const inputDir  = isEnToUr?"ltr":"rtl";
    const outputDir = isEnToUr?"rtl":"ltr";
    const inputFont = isEnToUr?"'Nunito',sans-serif":"'Noto Nastaliq Urdu',serif";
    const outputFont= isEnToUr?"'Noto Nastaliq Urdu',serif":"'Nunito',sans-serif";

    return(
      <div style={{direction:isRTL?"rtl":"ltr",animation:"slideIn 0.4s ease"}}>
        <BackBtn/>

        {/* Header */}
        <div style={{textAlign:"center",marginBottom:18}}>
          <div style={{fontSize:"2.8rem",marginBottom:6}}>🌐</div>
          <h2 style={{fontFamily:"'Fredoka One',cursive",color:"white",fontSize:"1.7rem",margin:"0 0 4px"}}>
            {isRTL?"ترجمہ":"Translator"}
          </h2>
          <p style={{color:"rgba(255,255,255,0.5)",fontSize:"0.75rem",fontWeight:700}}>
            {isRTL?"انگریزی ↔ اردو • آواز کے ساتھ":"English ↔ Urdu • With Voice"}
          </p>
        </div>

        {/* Mode toggle */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10,marginBottom:18}}>
          <div style={{
            background:isEnToUr?"linear-gradient(135deg,#4f46e5,#7c3aed)":"rgba(255,255,255,0.08)",
            borderRadius:50,padding:"8px 18px",fontWeight:900,fontSize:"0.85rem",
            color:"white",border:"1px solid rgba(255,255,255,0.15)",cursor:"pointer",transition:"all 0.3s",
            boxShadow:isEnToUr?"0 4px 16px rgba(124,58,237,0.45)":"none"
          }} onClick={()=>{setMode("en-ur");setInputText("");setOutputText("");}}>
            🇬🇧 EN → UR 🕌
          </div>
          <button onClick={swapLangs} style={{
            background:"rgba(255,255,255,0.1)",border:"1px solid rgba(255,255,255,0.2)",
            borderRadius:50,width:40,height:40,cursor:"pointer",fontSize:"1.1rem",
            color:"white",display:"flex",alignItems:"center",justifyContent:"center",
            transition:"all 0.25s",flexShrink:0
          }}>⇄</button>
          <div style={{
            background:!isEnToUr?"linear-gradient(135deg,#0d9488,#134e4a)":"rgba(255,255,255,0.08)",
            borderRadius:50,padding:"8px 18px",fontWeight:900,fontSize:"0.85rem",
            color:"white",border:"1px solid rgba(255,255,255,0.15)",cursor:"pointer",transition:"all 0.3s",
            boxShadow:!isEnToUr?"0 4px 16px rgba(13,148,136,0.45)":"none"
          }} onClick={()=>{setMode("ur-en");setInputText("");setOutputText("");}}>
            🕌 UR → EN 🇬🇧
          </div>
        </div>

        {/* Input Box */}
        <div style={{background:"rgba(255,255,255,0.06)",borderRadius:22,padding:"16px",border:"1px solid rgba(255,255,255,0.12)",marginBottom:12,boxShadow:"0 4px 20px rgba(0,0,0,0.2)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <span style={{fontSize:"0.72rem",fontWeight:800,color:isEnToUr?"#a5b4fc":"#5eead4",letterSpacing:"0.5px"}}>
              {isEnToUr?"🇬🇧 ENGLISH":"🕌 اردو"}
            </span>
            <div style={{display:"flex",gap:6}}>
              <span style={{fontSize:"0.65rem",color:"rgba(255,255,255,0.3)"}}>{charCount}/500</span>
              {inputText&&<button onClick={clearAll} style={{background:"rgba(255,255,255,0.08)",border:"none",borderRadius:20,padding:"3px 10px",color:"rgba(255,255,255,0.5)",cursor:"pointer",fontSize:"0.68rem",fontFamily:"inherit"}}>✕ Clear</button>}
            </div>
          </div>
          <textarea
            value={inputText}
            onChange={e=>{setInputText(e.target.value);setCharCount(e.target.value.length);}}
            placeholder={isEnToUr?"Type English here... e.g. 'Hello, how are you?'":"یہاں اردو لکھیں... مثال: 'آپ کیسے ہیں؟'"}
            maxLength={500}
            style={{
              width:"100%",minHeight:100,background:"rgba(255,255,255,0.04)",
              border:"1px solid rgba(255,255,255,0.08)",borderRadius:14,
              padding:"12px 14px",color:"white",fontSize:"0.95rem",
              fontFamily:inputFont,resize:"none",outline:"none",
              direction:inputDir,lineHeight:isEnToUr?1.6:2.2,
              boxSizing:"border-box"
            }}
          />
          <div style={{display:"flex",gap:8,marginTop:10,justifyContent:"flex-end"}}>
            {inputText&&<button onClick={()=>speakText(inputText,fromLang)} style={{
              background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.15)",
              borderRadius:50,padding:"7px 16px",color:"white",cursor:"pointer",
              fontFamily:"inherit",fontWeight:800,fontSize:"0.75rem"
            }}>🔊 {isEnToUr?"Listen EN":"سنیں UR"}</button>}
          </div>
        </div>

        {/* Translate Button */}
        <button onClick={translate} disabled={!inputText.trim()||loading} style={{
          width:"100%",background:inputText.trim()&&!loading
            ?"linear-gradient(135deg,#0d9488,#4f46e5)"
            :"rgba(255,255,255,0.08)",
          color:"white",border:"none",borderRadius:50,padding:"14px",
          fontWeight:900,cursor:inputText.trim()&&!loading?"pointer":"not-allowed",
          fontFamily:"'Nunito',sans-serif",fontSize:"1rem",
          transition:"all 0.3s",marginBottom:12,
          boxShadow:inputText.trim()&&!loading?"0 6px 24px rgba(13,148,136,0.4)":"none",
          letterSpacing:"0.5px"
        }}>
          {loading
            ?<span style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
               <span style={{display:"inline-block",width:16,height:16,border:"2px solid rgba(255,255,255,0.3)",borderTopColor:"white",borderRadius:"50%",animation:"spinSlow 0.8s linear infinite"}}/>
               {isRTL?"ترجمہ ہو رہا ہے...":"Translating..."}
             </span>
            :`🌐 ${isRTL?"ترجمہ کریں":"Translate"}`}
        </button>

        {/* Output Box */}
        {(outputText||loading)&&(
          <div style={{
            background:"linear-gradient(135deg,rgba(13,148,136,0.12),rgba(79,70,229,0.12))",
            borderRadius:22,padding:"16px",
            border:"1px solid rgba(13,148,136,0.3)",
            boxShadow:"0 8px 30px rgba(13,148,136,0.15)",
            animation:"popIn 0.4s ease"
          }}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <span style={{fontSize:"0.72rem",fontWeight:800,color:isEnToUr?"#5eead4":"#a5b4fc",letterSpacing:"0.5px"}}>
                {isEnToUr?"🕌 اردو":"🇬🇧 ENGLISH"}
              </span>
              {outputText&&<div style={{display:"flex",gap:6}}>
                <button onClick={()=>{navigator.clipboard&&navigator.clipboard.writeText(outputText);}} style={{
                  background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.15)",
                  borderRadius:50,padding:"5px 12px",color:"rgba(255,255,255,0.7)",cursor:"pointer",
                  fontFamily:"inherit",fontWeight:800,fontSize:"0.68rem"
                }}>📋 Copy</button>
                <button onClick={()=>speakText(outputText,toLang)} style={{
                  background:"rgba(13,148,136,0.25)",border:"1px solid rgba(13,148,136,0.4)",
                  borderRadius:50,padding:"5px 14px",color:"white",cursor:"pointer",
                  fontFamily:"inherit",fontWeight:800,fontSize:"0.75rem"
                }}>🔊 {isEnToUr?"سنیں":"Listen"}</button>
              </div>}
            </div>

            {loading&&!outputText
              ?<div style={{display:"flex",gap:5,justifyContent:"center",padding:"20px 0"}}>
                 {[0,1,2].map(i=><div key={i} style={{width:8,height:8,borderRadius:"50%",background:"#0d9488",animation:`dotPulse 1.2s ease-in-out infinite`,animationDelay:`${i*0.2}s`}}/>)}
               </div>
              :<div style={{
                fontFamily:outputFont,fontSize:"1.05rem",color:"white",
                direction:isEnToUr?"rtl":"ltr",lineHeight:isEnToUr?2.4:1.8,
                fontWeight:isEnToUr?600:400,minHeight:40
              }}>{outputText}</div>
            }
          </div>
        )}

        {/* Quick phrases */}
        {!outputText&&!loading&&(
          <div style={{marginTop:16}}>
            <p style={{color:"rgba(255,255,255,0.35)",fontSize:"0.7rem",fontWeight:800,marginBottom:10,textAlign:"center",letterSpacing:"0.5px"}}>
              {isRTL?"فوری جملے آزمائیں":"TRY QUICK PHRASES"}
            </p>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {(isEnToUr?[
                "How are you?","My name is","Good morning","Thank you very much","I want to learn Urdu"
              ]:[
                "آپ کیسے ہیں؟","میرا نام ہے","صبح بخیر","بہت شکریہ","میں انگریزی سیکھنا چاہتا ہوں"
              ]).map((phrase,i)=>(
                <button key={i} onClick={()=>{setInputText(phrase);setCharCount(phrase.length);setOutputText("");}}
                  style={{
                    background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",
                    borderRadius:14,padding:"10px 14px",color:"rgba(255,255,255,0.75)",
                    cursor:"pointer",fontFamily:isEnToUr?"'Nunito',sans-serif":"'Noto Nastaliq Urdu',serif",
                    fontSize:isEnToUr?"0.82rem":"0.88rem",
                    textAlign:isEnToUr?"left":"right",direction:isEnToUr?"ltr":"rtl",
                    transition:"all 0.2s",fontWeight:600
                  }}>
                  {phrase} →
                </button>
              ))}
            </div>
          </div>
        )}

        {/* XP tip */}
        <div style={{textAlign:"center",marginTop:16,color:"rgba(255,255,255,0.3)",fontSize:"0.68rem",fontWeight:700}}>
          💡 {isRTL?"ہر ترجمہ = +10 XP + ⭐1":"Every translation = +10 XP + ⭐1"}
        </div>
      </div>
    );
  };

  const renderPage=()=>{
    switch(page){
      case "library":return<Library/>;
      case "aichat":return<AIChat/>;
      case "conversations":return<Conversations/>;
      case "vocabulary":return<VocabPage/>;
      case "about":return<AboutPage/>;
      case "translator":return<TranslatorPage/>;
      default:return<Home/>;
    }
  };

  return(
    <div style={{background:"#0f0c29",minHeight:"100vh",position:"relative"}}>
      <AuroraBg/>
      <div style={{position:"relative",zIndex:1,maxWidth:440,margin:"0 auto",minHeight:"100vh",display:"flex",flexDirection:"column",padding:"10px"}}>
        {/* HEADER */}
        <div style={{
          background:"rgba(255,255,255,0.05)",backdropFilter:"blur(20px)",
          border:"1px solid rgba(255,255,255,0.1)",borderRadius:20,
          padding:"10px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",
          marginBottom:12,boxShadow:"0 4px 24px rgba(0,0,0,0.4)"
        }}>
          <div style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer"}} onClick={()=>setPage("home")}>
            <PandaMascot size={34}/>
            <div>
              <div style={{fontFamily:"'Fredoka One',cursive",color:"white",fontSize:"1.05rem",lineHeight:1}}>Bablo</div>
              <div style={{fontSize:"0.57rem",color:"rgba(167,139,250,0.6)",fontWeight:700}}>AI Learning</div>
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{background:"rgba(251,191,36,0.15)",border:"1px solid rgba(251,191,36,0.3)",borderRadius:20,padding:"5px 12px",fontSize:"0.82rem",fontWeight:900,color:"#fbbf24"}}>⭐ {stars}</div>
            <div style={{background:"rgba(124,58,237,0.2)",border:"1px solid rgba(124,58,237,0.4)",borderRadius:20,padding:"5px 12px",fontSize:"0.78rem",fontWeight:800,color:"#a78bfa"}}>{xp}xp</div>
          </div>
        </div>

        {/* MAIN */}
        <div style={{flex:1,overflowY:"auto",paddingBottom:14}}>
          {renderPage()}
        </div>

        {/* FOOTER */}
        <div style={{textAlign:"center",padding:"8px",fontSize:"0.62rem",color:"rgba(255,255,255,0.2)",fontWeight:700}}>
          Designed by <span style={{color:"rgba(167,139,250,0.6)"}}>Muhammad Usman</span> · Bablo 🐼 © 2025
        </div>
      </div>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<BabloApp/>);
</script>
</body>
</html>
