/* ===== ANIMATED AURORA BACKGROUND ===== */
.aurora-bg {

.aurora-orb {

  filter: blur(80px);
  pointer-events: none;
  z-index: 0;
  animation: orbFloat ease-in-out infinite;
}
@keyframes orbFloat {
  0%,100%{transform:translate(0,0) scale(1);}
  33%{transform:translate(30px,-20px) scale(1.05);}
  66%{transform:translate(-20px,15px) scale(0.95);}
}

/* Twinkling stars */
.stars-layer {
  position: fixed; top:0;left:0;right:0;bottom:0;

}
.star {
  position: absolute; width: 2px; height: 2px;

  animation: twinkle ease-in-out infinite;
}
@keyframes twinkle {
  0%,100%{opacity:0.1;transform:scale(1);}

}

@keyframes slideIn{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}

// ===== CLAUDE AI =====
async function callAI(messages) {
  const KEY = "";
  const SYSTEM = `You are Bablo, a warm AI panda tutor for Pakistani students.
LANGUAGE RULE:
- Student writes Urdu → reply ONLY in Urdu (natural Pakistani Urdu)
- Student writes English → reply English + add 🕌 اردو: [translation]
- Match student language naturally
STYLE: friendly teacher-friend, correct mistakes kindly, use emojis, end with encouraging question.`;
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": KEY,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify({ model: "claude-haiku-4-5-20251001", max_tokens: 700, system: SYSTEM, messages })
    });
    const d = await res.json();
    if (!res.ok) throw new Error(d?.error?.message || "Error " + res.status);
    return d.content?.[0]?.text || "🐼 Let me try again!";
  } catch(e) {
    return "❌ " + e.message + "\n\n🕌 اردو: کنکشن مسئلہ — دوبارہ کوشش کریں!";
  }
}

    {en:"Kind Aisha helped him: 'I drop things too — sit with me?' R2B's sensors detected something new: WARMTH. He had never felt it before. His LED eyes glowed.",ur:"آئشہ نے مدد کی: 'میں بھی گراتی ہوں — ساتھ بیٹھو گے؟' R2B نے پہلی بار گرماہٹ محسوس کی۔"},
    {en:"Year-end, R2B had installed KINDNESS.EXE. Most popular student — not for being smart, but for remembering every birthday and telling terrible jokes that somehow worked.",ur:"سال آخر: KINDNESS.EXE انسٹال۔ سب سے مقبول — سمارٹ نہیں، مہربان تھا۔"},
    {en:"R2B taught the school: intelligence opens doors, but kindness builds homes. His final speech: 'I came with circuits. I leave with a heart.' Everyone cried — even the principal! 🤖❤️",ur:"R2B نے سکھایا: ذہانت دروازے کھولتی ہے، لیکن مہربانی گھر بناتی ہے۔ الوداعی تقریر: 'سرکٹ لے کر آیا۔ دل لے کر جا رہا ہوں۔' سب روئے! 🤖❤️"},
   ]},
  {id:10,type:"story",emoji:"🌳",titleEn:"The Wise Tree",titleUr:"عقل مند درخت",level:"Intermediate",
   pages:[
    {en:"In a forest stood a 500-year-old tree. It had seen empires rise and fall, wars and peace, seeds of kindness and cruelty. The tree knew life's deepest secrets.",ur:"جنگل میں پانچ سو سال پرانا درخت۔ سلطنتیں، جنگیں، امن — سب دیکھا۔ زندگی کے راز جانتا تھا۔"},
    {en:"A boy sat under it, heartbroken after failing his exam. The tree whispered through its leaves: 'Storms broke my branches too. But every spring, I grow new leaves. Failure is just a season.'",ur:"لڑکا امتحان ناکام ہو کر بیٹھا۔ درخت بولا: 'طوفان نے مجھے بھی توڑا۔ لیکن ہر بہار پتے آئے۔ ناکامی بس ایک موسم ہے۔'"},
    {en:"He studied again, passed, became a teacher. Years later he brought his children: 'This tree taught me that life is about growing — not about never falling.'",ur:"دوبارہ پڑھا، پاس ہوا، استاد بنا۔ بچوں کو لایا: 'درخت نے سکھایا — زندگی بڑھنے کے بارے میں ہے۔'"},
    {en:"The tree still stands. Thousands have sat beneath it with broken hearts. Every one left with hope. Sometimes the oldest wisdom is already rooted in the earth, waiting for you. 🌳",ur:"درخت اب بھی کھڑا ہے۔ ہزاروں ٹوٹے دلوں نے اس کے نیچے بیٹھا۔ ہر کوئی امید لے کر گیا۔ کبھی کبھی سب سے پرانی حکمت زمین میں جڑی ہوتی ہے، تمہارا انتظار کرتی۔ 🌳"},
   ]},
  {id:11,type:"comic",emoji:"🎨",titleEn:"The Artist's Dream",titleUr:"فنکار کا خواب",level:"Beginner",
   pages:[
    {en:"Aisha loved to paint but had no supplies. She painted with mud on walls, charcoal on rocks, juice on paper. Her art was beautiful even with nothing.",ur:"عائشہ پینٹنگ پسند کرتی لیکن رنگ نہ تھے۔ مٹی، کوئلے، جوس سے پینٹ کرتی۔ کچھ نہیں تھا پھر بھی خوبصورت۔"},
    {en:"A businessman saw her wall mural and gave her real paints. But Aisha discovered: the passion in the heart matters more than the materials in the hand.",ur:"کاروباری نے دیوار پر نقاشی دیکھی، رنگ دیے۔ لیکن عائشہ نے سیکھا: دل کا جنون ہاتھ کے سامان سے زیادہ اہم ہے۔"},
