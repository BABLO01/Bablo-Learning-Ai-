/* ===== ANIMATED AURORA BACKGROUND ===== */
.aurora-bg {
  background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);

}
.aurora-orb {

  filter: blur(80px);
  pointer-events: none;
  z-index: 0;
  animation: orbFloat ease-in-out infinite;
}
@keyframes orbFloat {
  0%,100%{transform:translate(0,0) scale(1);}
  33%{transform:translate(30px,-20px) scale(1.05);}
  66%{transform:translate(-20px,15px) scale(0.95);}
}

/* Twinkling stars */
.stars-layer {
  position: fixed; top:0;left:0;right:0;bottom:0;
  pointer-events: none; z-index: 0; overflow: hidden;
}
.star {
  position: absolute; width: 2px; height: 2px;
  background: white; border-radius: 50%;
  animation: twinkle ease-in-out infinite;
}
@keyframes twinkle {
  0%,100%{opacity:0.1;transform:scale(1);}
  50%{opacity:0.8;transform:scale(1.5);}
}

@keyframes slideIn{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}

const BABLO_SYSTEM = `You are Bablo, a warm and smart AI panda tutor for Pakistani students.
LANGUAGE RULE:
- Student writes URDU → reply ONLY in Urdu (natural Pakistani Urdu)
- Student writes ENGLISH → reply English + add: 🕌 اردو: [Urdu translation]
- Match student language naturally
STYLE: friendly teacher-friend, correct mistakes kindly, use emojis, end with encouraging question.`;

async function callAI(messages) {
  const KEY = window.API_KEY;
  if (!KEY || KEY === "YOUR_API_KEY") {
    return "⚠️ API key not set in config.js!\n\n🕌 اردو: config.js میں API key نہیں لگی۔";
  }
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": KEY,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify({
        model: "claude-haiku-4-5-20251001",
        max_tokens: 700,
        system: BABLO_SYSTEM,
        messages: messages
      })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data?.error?.message || "Error " + res.status);
    return data.content?.[0]?.text || "🐼 Let me try again!";
  } catch (err) {
    return "❌ " + err.message + "\n\n🕌 اردو: کنکشن مسئلہ — دوبارہ کوشش کریں!";
  }
}

  // ===== AI CHAT =====
  const AIChat=()=>{
    const INIT={r:"ai",t:"السلام علیکم! 🐼\n\nمیں بابلو ہوں — آپ کا AI پانڈا استاد!\n\n• اردو میں لکھیں → اردو میں جواب\n• English میں لکھیں → English + اردو\n• 🔊 Listen دبائیں — جواب سنیں\n• 🎙️ مائیک دبائیں — بول کر message کریں\n\nHello! Ask me anything! 🎓"};
    const [sessions,setSessions]=useState([{id:1,name:"Chat 1",msgs:[INIT]}]);
    const [activeId,setActiveId]=useState(1);
    const [input,setInput]=useState("");
    const [loading,setLoading]=useState(false);
    const [showHist,setShowHist]=useState(false);
    const [isRec,setIsRec]=useState(false);
    const endRef=useRef(null);
    const recRef=useRef(null);
    const active=sessions.find(s=>s.id===activeId)||sessions[0];
    const msgs=active.msgs;
    const updateMsgs=(fn)=>setSessions(p=>p.map(s=>s.id===activeId?{...s,msgs:typeof fn==="function"?fn(s.msgs):fn}:s));
    useEffect(()=>{endRef.current?.scrollIntoView({behavior:"smooth"});},[msgs,loading]);
    const speakMsg=(text)=>{
      if(!window.speechSynthesis)return;
      window.speechSynthesis.cancel();
      const isUrdu=/[\u0600-\u06FF]/.test(text);
      const clean=isUrdu?text:text.split("🕌")[0].trim();
      const u=new SpeechSynthesisUtterance(clean||text);
      u.lang=isUrdu?"ur-PK":"en-US"; u.rate=0.86; u.pitch=1.05; u.volume=1;
      const vs=window.speechSynthesis.getVoices();
      const v=vs.find(x=>x.lang===u.lang)||vs.find(x=>x.lang.startsWith(u.lang.split("-")[0]));
      if(v)u.voice=v;
      window.speechSynthesis.speak(u);
    };
    const send=async(override)=>{
      const text=(override||input).trim();
      if(!text||loading)return;
      setInput("");
      const newMsgs=[...msgs,{r:"user",t:text}];
      updateMsgs(newMsgs);
      setLoading(true);
      try{
        const history=newMsgs.slice(-10).map(m=>({role:m.r==="ai"?"assistant":"user",content:m.t}));
        const reply=await callAI(history);
        updateMsgs(m=>[...m,{r:"ai",t:reply}]);
        setXp(x=>x+10);
      }catch(e){
        updateMsgs(m=>[...m,{r:"ai",t:"Oops! 🐼\n\n🕌 اردو: دوبارہ کوشش کریں!"}]);
      }
      setLoading(false);
    };
    const startRec=()=>{
      const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
      if(!SR){alert("Voice works in Chrome only!");return;}
      window.speechSynthesis.cancel();
      const r=new SR();
      r.lang=lang==="ur"?"ur-PK":"en-US"; r.continuous=false; r.interimResults=false;
      r.onstart=()=>setIsRec(true);
      r.onresult=(e)=>{const t=e.results[0][0].transcript;setIsRec(false);send(t);};
      r.onend=()=>setIsRec(false); r.onerror=()=>setIsRec(false);
      recRef.current=r; r.start();
    };
    const stopRec=()=>{recRef.current?.stop();setIsRec(false);};
    const newChat=()=>{
      const id=Date.now();
      setSessions(p=>[...p,{id,name:"Chat "+(p.length+1),msgs:[INIT]}]);
      setActiveId(id);setShowHist(false);
    };
    const quickQ=["Help with grammar 📝","New word ✨","Study tips 🧠","Correct my English ✅","What is perseverance? 💪","How to focus? 🎯"];
    return(
      <div style={{direction:isRTL?"rtl":"ltr",animation:"slideIn 0.4s ease"}}>
        <div style={{display:"flex",gap:8,marginBottom:12,alignItems:"center"}}>
          <BackBtn/>
          <div style={{flex:1}}/>
          <button onClick={()=>setShowHist(h=>!h)} style={btn(showHist?"rgba(124,58,237,0.5)":"rgba(255,255,255,0.08)",{border:"1px solid rgba(255,255,255,0.2)",padding:"8px 12px",fontSize:"0.76rem"})}>📜 {isRTL?"تاریخ":"History"}</button>
          <button onClick={newChat} style={btn("linear-gradient(135deg,#4f46e5,#7c3aed)",{padding:"8px 12px",fontSize:"0.76rem"})}>✚ {isRTL?"نئی":"New"}</button>
        </div>
        {showHist&&(
          <div style={{background:"rgba(0,0,0,0.45)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:16,padding:"12px",marginBottom:12,animation:"slideIn 0.3s ease"}}>
            <div style={{color:"white",fontWeight:800,fontSize:"0.85rem",marginBottom:8}}>💬 {isRTL?"گفتگو کی تاریخ":"Chat History"}</div>
            {sessions.map(s=>(
              <div key={s.id} onClick={()=>{setActiveId(s.id);setShowHist(false);}} style={{padding:"9px 12px",borderRadius:10,marginBottom:4,cursor:"pointer",transition:"all 0.2s",background:s.id===activeId?"rgba(124,58,237,0.3)":"rgba(255,255,255,0.04)",border:`1px solid ${s.id===activeId?"rgba(124,58,237,0.5)":"rgba(255,255,255,0.07)"}`}}>
                <div style={{color:"white",fontSize:"0.83rem",fontWeight:700}}>{s.name}</div>
                <div style={{color:"rgba(255,255,255,0.38)",fontSize:"0.66rem"}}>{s.msgs.length-1} messages</div>
              </div>
            ))}
          </div>
        )}
        <div style={{background:"linear-gradient(135deg,#064e3b,#065f46)",borderRadius:20,padding:"13px 16px",marginBottom:12,display:"flex",alignItems:"center",gap:12,border:"1px solid rgba(16,185,129,0.3)",boxShadow:"0 8px 25px rgba(16,185,129,0.2)"}}>
          <PandaMascot size={44}/>
          <div style={{flex:1}}>
            <div style={{fontFamily:"'Fredoka One',cursive",color:"white",fontSize:"1.05rem"}}>🤖 Bablo AI</div>
            <div style={{color:"rgba(52,211,153,0.9)",fontSize:"0.7rem",fontWeight:700,display:"flex",alignItems:"center",gap:5}}>
              <div style={{width:6,height:6,borderRadius:"50%",background:"#34d399",animation:"dotPulse 1.5s ease-in-out infinite"}}/>
              {active.name} • Claude AI
            </div>
          </div>
        </div>
        <div style={{background:"rgba(0,0,0,0.35)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:20,padding:"14px",minHeight:260,maxHeight:340,overflowY:"auto",marginBottom:12}}>
          {msgs.map((m,i)=>(
            <div key={i} style={{display:"flex",flexDirection:m.r==="ai"?"row":"row-reverse",marginBottom:14,gap:8,alignItems:"flex-end",animation:"slideIn 0.3s ease"}}>
              {m.r==="ai"&&<div style={{fontSize:"1.55rem",flexShrink:0}}>🐼</div>}
              <div style={{background:m.r==="ai"?"rgba(255,255,255,0.96)":"linear-gradient(135deg,#4f46e5,#7c3aed)",color:m.r==="ai"?"#1e1b4b":"white",padding:"11px 14px",borderRadius:m.r==="ai"?"4px 18px 18px 18px":"18px 4px 18px 18px",maxWidth:"84%",fontSize:"0.86rem",lineHeight:1.8,boxShadow:"0 4px 18px rgba(0,0,0,0.3)",whiteSpace:"pre-wrap"}}>
                {m.t}
                {m.r==="ai"&&(
                  <button onClick={()=>speakMsg(m.t)} style={{display:"flex",alignItems:"center",gap:4,background:"rgba(124,58,237,0.1)",border:"1px solid rgba(124,58,237,0.25)",borderRadius:20,padding:"3px 10px",marginTop:7,cursor:"pointer",fontSize:"0.72rem",color:"#7c3aed",fontFamily:"inherit",fontWeight:700}}>
                    🔊 Listen / سنیں
                  </button>
                )}
              </div>
            </div>
          ))}
          {loading&&(
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <div style={{fontSize:"1.55rem"}}>🐼</div>
              <div style={{background:"rgba(255,255,255,0.93)",padding:"10px 18px",borderRadius:"4px 18px 18px 18px",display:"flex",gap:5}}>
                {[0,0.2,0.4].map((d,i)=><div key={i} style={{width:8,height:8,borderRadius:"50%",background:"#7c3aed",animation:`dotPulse 1s ease ${d}s infinite`}}/>)}
              </div>
            </div>
          )}
          <div ref={endRef}/>
        </div>
        <div style={{display:"flex",gap:8,marginBottom:10,alignItems:"center"}}>
          <div style={{position:"relative",flexShrink:0}}>
            {isRec&&<div style={{position:"absolute",inset:-5,borderRadius:"50%",border:"3px solid rgba(239,68,68,0.5)",animation:"dotPulse 1s ease-out infinite"}}/>}
            <button onMouseDown={startRec} onMouseUp={stopRec} onTouchStart={startRec} onTouchEnd={stopRec} style={{width:46,height:46,borderRadius:"50%",border:"none",cursor:"pointer",fontSize:"1.2rem",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.2s",background:isRec?"linear-gradient(135deg,#ef4444,#dc2626)":"linear-gradient(135deg,#7c3aed,#4f46e5)",boxShadow:isRec?"0 0 0 5px rgba(239,68,68,0.2)":"0 4px 14px rgba(124,58,237,0.4)"}}>
              {isRec?"⏹":"🎙️"}
            </button>
          </div>
          <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!loading&&send()} placeholder={isRTL?"یہاں لکھیں یا مائیک دبائیں...":"Type here or press mic..."} style={{flex:1,padding:"13px 18px",borderRadius:50,border:"2px solid rgba(124,58,237,0.4)",fontSize:"0.87rem",fontFamily:"'Nunito',sans-serif",background:"rgba(255,255,255,0.08)",color:"white"}}/>
          <button onClick={()=>send()} disabled={loading||!input.trim()} style={btn("linear-gradient(135deg,#7c3aed,#4f46e5)",{padding:"13px 18px",flexShrink:0,opacity:loading||!input.trim()?0.45:1,boxShadow:"0 4px 15px rgba(124,58,237,0.4)"})}>
            {loading?"⏳":"✈️"}
          </button>
        </div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:6}}>
          {quickQ.map(q=>(<button key={q} onClick={()=>send(q)} style={{background:"rgba(124,58,237,0.14)",border:"1px solid rgba(124,58,237,0.3)",borderRadius:20,padding:"5px 11px",color:"rgba(255,255,255,0.78)",fontSize:"0.68rem",cursor:"pointer",fontFamily:"inherit",fontWeight:700}}>{q}</button>))}
        </div>
        <div style={{textAlign:"center",color:"rgba(255,255,255,0.25)",fontSize:"0.62rem"}}>🎙️ {isRTL?"مائیک دبائیں اور بولیں":"Press mic and speak — sends automatically"}</div>
      </div>
    );
  };

    // ===== CONVERSATIONS =====
  const Conversations=()=>{
    const [sel,setSel]=useState(null);
    const [step,setStep]=useState(0);
    if(sel){
      const conv=CONVERSATIONS.find(c=>c.id===sel);
      const ex=conv.exchanges[step];
      const isAI=ex.r==="ai";
      const isLast=step===conv.exchanges.length-1;
      return(
        <div style={{direction:isRTL?"rtl":"ltr",animation:"slideIn 0.4s ease"}}>
          <button onClick={()=>{setSel(null);setStep(0);}} style={{...btn("rgba(255,255,255,0.1)"),border:"1px solid rgba(255,255,255,0.2)",marginBottom:14,fontSize:"0.85rem"}}>← Back</button>
          <div style={{
            background:`linear-gradient(135deg,${conv.color},${conv.color}88)`,
            borderRadius:20,padding:"16px",marginBottom:14,textAlign:"center",
            border:"1px solid rgba(255,255,255,0.15)"
          }}>
            <div style={{fontSize:"1.9rem",marginBottom:4}}>{conv.icon}</div>
            <div style={{fontFamily:"'Fredoka One',cursive",color:"white",fontWeight:900}}>{isRTL?conv.topicUr:conv.topicEn}</div>
            <div style={{display:"flex",gap:4,justifyContent:"center",marginTop:8}}>
              {conv.exchanges.map((_,i)=><div key={i} style={{width:8,height:8,borderRadius:"50%",background:i<=step?"#fbbf24":"rgba(255,255,255,0.2)",transition:"all 0.3s"}}/>)}
            </div>
          </div>
          
          <div style={{background:"white",borderRadius:20,padding:"18px",marginBottom:12,boxShadow:"0 8px 30px rgba(0,0,0,0.25)",border:`3px solid ${isAI?"#7c3aed":"#10b981"}`}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
              <span style={{fontSize:"1.5rem"}}>{isAI?"🐼":"👤"}</span>
              <span style={{fontWeight:800,color:isAI?"#7c3aed":"#059669",fontSize:"0.85rem"}}>{isAI?"Bablo AI":"You"}</span>
            </div>
            <div style={{fontSize:"0.95rem",lineHeight:1.9,color:"#1e1b4b",background:"#f0f4ff",padding:"12px 14px",borderRadius:12,marginBottom:10}}>
              {ex.en}<button onClick={()=>speak(ex.en,'en')} style={{background:"none",border:"none",cursor:"pointer",fontSize:"0.9rem",marginLeft:5}}>🔊</button>
            </div>
            <div style={{fontFamily:"'Noto Nastaliq Urdu',serif",fontSize:"0.92rem",lineHeight:2.4,color:"#4c0098",direction:"rtl",background:"#faf5ff",padding:"10px 12px",borderRadius:12}}>
              {ex.ur}<button onClick={()=>speak(ex.ur,'ur')} style={{background:"none",border:"none",cursor:"pointer",fontSize:"0.9rem",marginLeft:5}}>🔊</button>
            </div>
          </div>
          
          <button onClick={()=>{if(!isLast)setStep(step+1);else{setStars(s=>s+1);setXp(x=>x+60);setSel(null);setStep(0);}}}
            style={{...btn(isLast?"linear-gradient(135deg,#f59e0b,#ef4444)":"linear-gradient(135deg,#7c3aed,#4f46e5)"),width:"100%",padding:"14px"}}>
            {isLast?"⭐ Finish Conversation!":"Next Exchange →"}
          </button>
        </div>
      );
    }
    return(
      <div style={{direction:isRTL?"rtl":"ltr",animation:"slideIn 0.4s ease"}}>
        <BackBtn/>
        <h2 style={{fontFamily:"'Fredoka One',cursive",color:"white",marginBottom:16,fontSize:"1.6rem"}}>💬 {isRTL?"گفتگو کی مشق":"Conversations"}</h2>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {CONVERSATIONS.map(c=>(
            <div key={c.id} onClick={()=>setSel(c.id)} className="card-lift"
              style={{
                background:`linear-gradient(135deg,${c.color}dd,${c.color}88)`,
                borderRadius:18,padding:"16px 18px",
                display:"flex",alignItems:"center",gap:14,
                boxShadow:"0 6px 20px rgba(0,0,0,0.3)",
                border:"1px solid rgba(255,255,255,0.1)"
              }}>
              <div style={{fontSize:"2.2rem",filter:"drop-shadow(0 3px 8px rgba(0,0,0,0.4))"}}>{c.icon}</div>
              <div style={{flex:1}}>
                <div style={{fontWeight:800,fontSize:"0.95rem",color:"white"}}>{isRTL?c.topicUr:c.topicEn}</div>
                <div style={{fontSize:"0.68rem",color:"rgba(255,255,255,0.5)",marginTop:2}}>{c.exchanges.length} exchanges • +1⭐</div>
              </div>
              <div style={{color:"rgba(255,255,255,0.5)",fontSize:"1.2rem"}}>→</div>
            </div>
          ))}
        </div>
      </div>
    );
  };

  // ===== VOCABULARY =====
  const VocabPage=()=>{
    const [flip,setFlip]=useState({});
    return(
      <div style={{direction:isRTL?"rtl":"ltr",animation:"slideIn 0.4s ease"}}>
        <BackBtn/>
        <h2 style={{fontFamily:"'Fredoka One',cursive",color:"white",marginBottom:4,fontSize:"1.6rem"}}>✨ {isRTL?"الفاظ کا خزانہ":"Word Treasury"}</h2>
        <p style={{color:"rgba(255,255,255,0.4)",fontSize:"0.75rem",marginBottom:14}}>{isRTL?"مثال دیکھنے کے لیے کارڈ پر ٹیپ کریں!":"Tap a card to see example sentence!"}</p>
        <div style={{display:"flex",flexDirection:"column",gap:9}}>
          {VOCAB.map((v,i)=>(
            <div key={i} onClick={()=>setFlip(f=>({...f,[i]:!f[i]}))}
              style={{
                background:flip[i]?"rgba(124,58,237,0.15)":"rgba(255,255,255,0.07)",
                borderRadius:18,padding:"14px 16px",
                cursor:"pointer",transition:"all 0.3s",
                border:`2px solid ${flip[i]?"rgba(124,58,237,0.6)":"rgba(255,255,255,0.1)"}`,
                boxShadow:flip[i]?"0 6px 20px rgba(124,58,237,0.25)":"none"
              }}>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <div style={{
                  minWidth:42,width:42,height:42,
                  background:"linear-gradient(135deg,#4f46e5,#7c3aed)",
                  borderRadius:12,display:"flex",alignItems:"center",justifyContent:"center",
                  fontSize:"1.3rem",boxShadow:"0 4px 12px rgba(124,58,237,0.4)"
                }}>{v.icon}</div>
                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{fontWeight:900,fontSize:"1.05rem",color:"#a5b4fc"}}>{v.en}</span>
                    <button onClick={e=>{e.stopPropagation();speak(v.en,'en');}} style={{background:"none",border:"none",cursor:"pointer",fontSize:"0.85rem"}}>🔊</button>
                  </div>
                  <div style={{fontFamily:"'Noto Nastaliq Urdu',serif",fontSize:"0.9rem",color:"#c4b5fd",direction:"rtl",marginTop:1}}>
                    {v.ur}
                    <button onClick={e=>{e.stopPropagation();speak(v.ur,'ur');}} style={{background:"none",border:"none",cursor:"pointer",fontSize:"0.85rem",marginLeft:4}}>🔊</button>
                  </div>
                  <div style={{fontSize:"0.75rem",color:"rgba(255,255,255,0.45)",fontStyle:"italic",marginTop:2}}>{v.meaning}</div>
                  {flip[i]&&(
                    <div style={{fontSize:"0.8rem",color:"#34d399",marginTop:7,background:"rgba(16,185,129,0.1)",padding:"6px 10px",borderRadius:10,fontStyle:"italic",border:"1px solid rgba(52,211,153,0.2)"}}>
                      💬 "{v.ex}"
                    </div>
                  )}
                </div>
              </div>
            </div>
          ))}
        </div>
      </div>
    );
  };

  const renderPage=()=>{
    switch(page){
      case "library":return<Library/>;
      case "aichat":return<AIChat/>;
      case "conversations":return<Conversations/>;
      case "vocabulary":return<VocabPage/>;
      default:return<Home/>;
    }
  };

  return(
    <div style={{background:"#0f0c29",minHeight:"100vh",position:"relative"}}>
      <AuroraBg/>
      <div style={{position:"relative",zIndex:1,maxWidth:440,margin:"0 auto",minHeight:"100vh",display:"flex",flexDirection:"column",padding:"10px"}}>
        {/* HEADER */}
        <div style={{
          background:"rgba(255,255,255,0.05)",backdropFilter:"blur(20px)",
          border:"1px solid rgba(255,255,255,0.1)",borderRadius:20,
          padding:"10px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",
          marginBottom:12,boxShadow:"0 4px 24px rgba(0,0,0,0.4)"
        }}>
          <div style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer"}} onClick={()=>setPage("home")}>
            <PandaMascot size={34}/>
            <div>
              <div style={{fontFamily:"'Fredoka One',cursive",color:"white",fontSize:"1.05rem",lineHeight:1}}>Bablo</div>
              <div style={{fontSize:"0.57rem",color:"rgba(167,139,250,0.6)",fontWeight:700}}>AI Learning</div>
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{background:"rgba(251,191,36,0.15)",border:"1px solid rgba(251,191,36,0.3)",borderRadius:20,padding:"5px 12px",fontSize:"0.82rem",fontWeight:900,color:"#fbbf24"}}>⭐ {stars}</div>
            <div style={{background:"rgba(124,58,237,0.2)",border:"1px solid rgba(124,58,237,0.4)",borderRadius:20,padding:"5px 12px",fontSize:"0.78rem",fontWeight:800,color:"#a78bfa"}}>{xp}xp</div>
          </div>
        </div>

        {/* MAIN */}
        <div style={{flex:1,overflowY:"auto",paddingBottom:14}}>
          {renderPage()}
        </div>

        {/* FOOTER */}
        <div style={{textAlign:"center",padding:"8px",fontSize:"0.62rem",color:"rgba(255,255,255,0.2)",fontWeight:700}}>
          Designed by <span style={{color:"rgba(167,139,250,0.6)"}}>Muhammad Usman</span> · Bablo 🐼 © 2025
        </div>
      </div>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<BabloApp/>);
</script>
</body>
</html>
